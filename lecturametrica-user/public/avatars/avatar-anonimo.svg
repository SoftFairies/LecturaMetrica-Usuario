<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar Anónimo — Lector misterioso</title>
  <desc>Avatar de perfil genérico anónimo con paleta slate — LecturaMetrica</desc>
  <defs>
    <clipPath id="cc"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#94A3B8" stroke-width="3"/>
  <circle cx="60" cy="60" r="54" fill="#0F172A" clip-path="url(#cc)"/>

  <!-- Shoulders -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#1E293B" clip-path="url(#cc)"/>
  <ellipse cx="60" cy="100" rx="30" ry="20" fill="#334155" clip-path="url(#cc)"/>

  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#94A3B8"/>
  <!-- Simple hair -->
  <ellipse cx="60" cy="33" rx="22" ry="12" fill="#1E293B"/>
  <ellipse cx="40" cy="43" rx="6"  ry="13" fill="#1E293B"/>
  <ellipse cx="80" cy="43" rx="6"  ry="13" fill="#1E293B"/>
  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#94A3B8"/>
  <circle cx="82" cy="52" r="5" fill="#94A3B8"/>

  <!-- Eyes — minimal dots -->
  <circle cx="51" cy="50" r="3.5" fill="#1E293B"/>
  <circle cx="69" cy="50" r="3.5" fill="#1E293B"/>
  <circle cx="52" cy="49" r="1.2" fill="#64748B"/>
  <circle cx="70" cy="49" r="1.2" fill="#64748B"/>

  <!-- Neutral expression -->
  <line x1="52" y1="62" x2="68" y2="62" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Question mark detail -->
  <path d="M57,74 Q57,70 60,69 Q64,68 64,72 Q64,75 60,76" fill="none" stroke="#64748B" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="60" cy="79" r="1.5" fill="#64748B"/>

  <!-- Subtle shimmer lines (mysterious) -->
  <line x1="26" y1="36" x2="32" y2="36" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="88" y1="36" x2="94" y2="36" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="22" y1="56" x2="28" y2="56" stroke="#475569" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="56" x2="98" y2="56" stroke="#475569" stroke-width="1" opacity="0.3"/>

  <!-- Badge -->
  <circle cx="96" cy="18" r="12" fill="#64748B"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">?</text>
</svg>
