<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar Carlos — Filósofo lector</title>
  <desc>Avatar de perfil masculino con gafas redondas y barba, paleta violeta — LecturaMetrica</desc>
  <defs>
    <clipPath id="cc"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#8B5CF6" stroke-width="3"/>
  <circle cx="60" cy="60" r="54" fill="#1E1B4B" clip-path="url(#cc)"/>

  <!-- Turtleneck -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#2E1065" clip-path="url(#cc)"/>
  <ellipse cx="60" cy="102" rx="26" ry="16" fill="#4C1D95" clip-path="url(#cc)"/>
  <rect x="46" y="96" width="28" height="14" rx="4" fill="#3B0764" clip-path="url(#cc)"/>

  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#EDE9FE"/>
  <!-- Hair -->
  <ellipse cx="60" cy="33" rx="22" ry="12" fill="#1C1917"/>
  <ellipse cx="40" cy="43" rx="6"  ry="13" fill="#1C1917"/>
  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#EDE9FE"/>
  <circle cx="82" cy="52" r="5" fill="#EDE9FE"/>

  <!-- Eyes -->
  <ellipse cx="51" cy="50" rx="3.5" ry="3.5" fill="#0F172A"/>
  <ellipse cx="69" cy="50" rx="3.5" ry="3.5" fill="#0F172A"/>
  <circle cx="52.2" cy="48.8" r="1.2" fill="#fff"/>
  <circle cx="70.2" cy="48.8" r="1.2" fill="#fff"/>

  <!-- Round glasses -->
  <circle cx="51" cy="50" r="8.5" fill="none" stroke="#8B5CF6" stroke-width="1.4"/>
  <circle cx="69" cy="50" r="8.5" fill="none" stroke="#8B5CF6" stroke-width="1.4"/>
  <line x1="59.5" y1="50" x2="60.5" y2="50" stroke="#8B5CF6" stroke-width="1.2"/>
  <line x1="42.5" y1="49" x2="38"   y2="48" stroke="#8B5CF6" stroke-width="1.2"/>
  <line x1="77.5" y1="49" x2="82"   y2="48" stroke="#8B5CF6" stroke-width="1.2"/>

  <!-- Beard -->
  <ellipse cx="60" cy="66" rx="14" ry="7" fill="#292524"/>
  <ellipse cx="60" cy="63" rx="11" ry="5" fill="#3C3630"/>

  <!-- Neutral expression (thinking) -->
  <line x1="53" y1="60" x2="67" y2="60" stroke="#4C1D95" stroke-width="2" stroke-linecap="round"/>

  <!-- Badge -->
  <circle cx="96" cy="18" r="12" fill="#8B5CF6"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">C</text>
</svg>
