<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140" role="img">
  <title>Agregar 3 libros</title>
  <desc>Insignia por agregar 3 libros a la biblioteca — LecturaMetrica</desc>
  <defs>
    <style>
      .lbl { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; fill: #E2E8F0; }
    </style>
  </defs>

  <!-- Hexagon outer -->
  <polygon points="60,2 115,30 115,88 60,116 5,88 5,30" fill="#1A2332" stroke="#8B5CF6" stroke-width="2.5"/>
  <!-- Hexagon inner -->
  <polygon points="60,12 105,36 105,82 60,106 15,82 15,36" fill="#0D1117"/>
  <!-- Corner dots -->
  <circle cx="60"  cy="2"   r="4" fill="#8B5CF6"/>
  <circle cx="115" cy="30"  r="4" fill="#8B5CF6"/>
  <circle cx="115" cy="88"  r="4" fill="#8B5CF6"/>
  <circle cx="60"  cy="116" r="4" fill="#8B5CF6"/>
  <circle cx="5"   cy="88"  r="4" fill="#8B5CF6"/>
  <circle cx="5"   cy="30"  r="4" fill="#8B5CF6"/>

  <!-- Book 3 (back) -->
  <rect x="36" y="30" width="26" height="38" rx="3" fill="#8B5CF6" opacity="0.3"/>
  <rect x="36" y="30" width="5"  height="38" rx="2" fill="#8B5CF6" opacity="0.45"/>
  <!-- Book 2 (middle) -->
  <rect x="44" y="24" width="26" height="38" rx="3" fill="#8B5CF6" opacity="0.6"/>
  <rect x="44" y="24" width="5"  height="38" rx="2" fill="#8B5CF6" opacity="0.75"/>
  <!-- Book 1 (front) -->
  <rect x="52" y="18" width="26" height="38" rx="3" fill="#8B5CF6"/>
  <rect x="52" y="18" width="5"  height="38" rx="2" fill="#6D28D9"/>
  <!-- Lines on front cover -->
  <rect x="60" y="24" width="14" height="2.5" rx="1" fill="#0D1117" opacity="0.4"/>
  <rect x="60" y="30" width="10" height="2.5" rx="1" fill="#0D1117" opacity="0.3"/>
  <rect x="60" y="36" width="12" height="2.5" rx="1" fill="#0D1117" opacity="0.3"/>
  <rect x="60" y="42" width="9"  height="2.5" rx="1" fill="#0D1117" opacity="0.25"/>

  <!-- "3" badge circle -->
  <circle cx="36" cy="76" r="13" fill="#8B5CF6"/>
  <text x="36" y="81" style="font-family:system-ui,sans-serif;font-size:15px;font-weight:700;fill:#fff;text-anchor:middle;">3</text>

  <!-- Plus sign -->
  <line x1="72" y1="68" x2="72" y2="82" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="75" x2="79" y2="75" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>

  <text x="60" y="130" class="lbl">Agregar 3 libros</text>
</svg>
