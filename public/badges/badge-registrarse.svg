<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140" role="img">
  <title>Registrarse</title>
  <desc>Insignia de bienvenida al registrarse — LecturaMetrica</desc>
  <defs>
    <style>
      .lbl { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 600; text-anchor: middle; fill: #E2E8F0; }
    </style>
  </defs>

  <!-- Shield / hexagon -->
  <path d="M60,2 L113,29 L113,85 L60,112 L7,85 L7,29 Z" fill="#1A2332" stroke="#3B82F6" stroke-width="2.5"/>
  <path d="M60,12 L103,35 L103,79 L60,102 L17,79 L17,35 Z" fill="#0D1117"/>
  <!-- Vertex dots -->
  <circle cx="60"  cy="2"   r="4" fill="#3B82F6"/>
  <circle cx="113" cy="29"  r="4" fill="#3B82F6"/>
  <circle cx="113" cy="85"  r="4" fill="#3B82F6"/>
  <circle cx="60"  cy="112" r="4" fill="#3B82F6"/>
  <circle cx="7"   cy="85"  r="4" fill="#3B82F6"/>
  <circle cx="7"   cy="29"  r="4" fill="#3B82F6"/>

  <!-- Person silhouette -->
  <circle cx="60" cy="42" r="14" fill="#3B82F6" opacity="0.9"/>
  <path d="M35,78 C35,64 46,55 60,55 C74,55 85,64 85,78" fill="#3B82F6" opacity="0.9"/>

  <!-- Sparkle top-right -->
  <path d="M90,26 L92,32 L98,34 L92,36 L90,42 L88,36 L82,34 L88,32 Z" fill="#3B82F6" opacity="0.65"/>
  <!-- Sparkle left -->
  <path d="M22,52 L23.5,56 L27.5,57.5 L23.5,59 L22,63 L20.5,59 L16.5,57.5 L20.5,56 Z" fill="#3B82F6" opacity="0.45"/>

  <!-- Welcome check circle -->
  <circle cx="60" cy="84" r="12" fill="#3B82F6"/>
  <path d="M53.5,84 L57.5,88 L67,79" fill="none" stroke="#0D1117" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="60" y="130" class="lbl">Registrarse</text>
</svg>
