<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar Ana — Escritora y lectora</title>
  <desc>Avatar de perfil femenino con lápiz en el cabello y paleta teal — LecturaMetrica</desc>
  <defs>
    <clipPath id="cc"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#14B8A6" stroke-width="3"/>
  <circle cx="60" cy="60" r="54" fill="#042F2E" clip-path="url(#cc)"/>

  <!-- Shoulders -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#134E4A" clip-path="url(#cc)"/>
  <ellipse cx="60" cy="100" rx="30" ry="20" fill="#0F766E" clip-path="url(#cc)"/>

  <!-- Long wavy hair sides -->
  <path d="M38,42 C34,52 34,72 36,86" fill="none" stroke="#365314" stroke-width="14" stroke-linecap="round" clip-path="url(#cc)"/>
  <path d="M82,42 C86,52 86,72 84,86" fill="none" stroke="#365314" stroke-width="14" stroke-linecap="round" clip-path="url(#cc)"/>
  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#CCFBF1"/>
  <!-- Hair top -->
  <ellipse cx="60" cy="33" rx="22" ry="13" fill="#365314"/>
  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#CCFBF1"/>
  <circle cx="82" cy="52" r="5" fill="#CCFBF1"/>

  <!-- Eyes -->
  <ellipse cx="51" cy="50" rx="3.5" ry="4" fill="#0F172A"/>
  <ellipse cx="69" cy="50" rx="3.5" ry="4" fill="#0F172A"/>
  <circle cx="52.2" cy="48.8" r="1.2" fill="#fff"/>
  <circle cx="70.2" cy="48.8" r="1.2" fill="#fff"/>

  <!-- Lashes left -->
  <line x1="47" y1="46.5" x2="45" y2="44" stroke="#0F172A" stroke-width="1"/>
  <line x1="51" y1="46"   x2="51" y2="43" stroke="#0F172A" stroke-width="1"/>
  <line x1="55" y1="46.5" x2="57" y2="44" stroke="#0F172A" stroke-width="1"/>

  <!-- Blushed cheeks -->
  <ellipse cx="44" cy="58" rx="6" ry="3.5" fill="#F43F5E" opacity="0.22"/>
  <ellipse cx="76" cy="58" rx="6" ry="3.5" fill="#F43F5E" opacity="0.22"/>

  <!-- Smile -->
  <path d="M52,63 Q60,70 68,63" fill="none" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>

  <!-- Pencil in hair (top right area) -->
  <g transform="rotate(30,78,34)">
    <rect x="76" y="22" width="4" height="20" rx="1.5" fill="#FBBF24"/>
    <polygon points="76,42 80,42 78,48" fill="#EF4444"/>
    <rect x="76" y="20" width="4" height="4" rx="1" fill="#D4890A"/>
  </g>

  <!-- Badge -->
  <circle cx="96" cy="18" r="12" fill="#14B8A6"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">A</text>
</svg>
