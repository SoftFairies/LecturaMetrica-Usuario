<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar Juan — Aventurero literario</title>
  <desc>Avatar de perfil masculino con paleta azul — LecturaMetrica</desc>
  <defs>
    <clipPath id="cc"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#3B82F6" stroke-width="3"/>
  <circle cx="60" cy="60" r="54" fill="#172554" clip-path="url(#cc)"/>

  <!-- Shoulders / hoodie -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#1E3A5F" clip-path="url(#cc)"/>
  <ellipse cx="60" cy="100" rx="30" ry="20" fill="#1D4ED8" clip-path="url(#cc)"/>
  <!-- Hoodie string detail -->
  <line x1="54" y1="90" x2="52" y2="100" stroke="#93C5FD" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="90" x2="68" y2="100" stroke="#93C5FD" stroke-width="1.5" opacity="0.5"/>

  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#DBEAFE"/>
  <!-- Short hair -->
  <ellipse cx="60" cy="33" rx="22" ry="12" fill="#0F172A"/>
  <ellipse cx="42" cy="42" rx="7"  ry="14" fill="#0F172A"/>
  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#DBEAFE"/>
  <circle cx="82" cy="52" r="5" fill="#DBEAFE"/>

  <!-- Eyebrows -->
  <path d="M44,44 Q51,41 57,44" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>
  <path d="M63,44 Q69,41 76,44" fill="none" stroke="#0F172A" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="51" cy="50" rx="3.5" ry="4" fill="#0F172A"/>
  <ellipse cx="69" cy="50" rx="3.5" ry="4" fill="#0F172A"/>
  <circle cx="52.2" cy="48.8" r="1.2" fill="#fff"/>
  <circle cx="70.2" cy="48.8" r="1.2" fill="#fff"/>

  <!-- Nose -->
  <path d="M58,56 Q60,60 62,56" fill="none" stroke="#93C5FD" stroke-width="1.2" opacity="0.5"/>

  <!-- Big grin -->
  <path d="M50,63 Q60,72 70,63" fill="none" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="44" cy="60" rx="6" ry="3.5" fill="#3B82F6" opacity="0.18"/>
  <ellipse cx="76" cy="60" rx="6" ry="3.5" fill="#3B82F6" opacity="0.18"/>

  <!-- Badge -->
  <circle cx="96" cy="18" r="12" fill="#3B82F6"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">J</text>
</svg>
