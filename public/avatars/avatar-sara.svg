<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar Sara — Lectora digital</title>
  <desc>Avatar de perfil femenino joven con mechón verde y paleta verde — LecturaMetrica</desc>
  <defs>
    <clipPath id="cc"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#22C55E" stroke-width="3"/>
  <circle cx="60" cy="60" r="54" fill="#052E16" clip-path="url(#cc)"/>

  <!-- Shoulders -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#14532D" clip-path="url(#cc)"/>
  <ellipse cx="60" cy="100" rx="30" ry="20" fill="#15803D" clip-path="url(#cc)"/>

  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#D1FAE5"/>
  <!-- Asymmetric hair -->
  <ellipse cx="60" cy="33" rx="22" ry="13" fill="#1C1917"/>
  <ellipse cx="40" cy="44" rx="8"  ry="15" fill="#1C1917"/>
  <ellipse cx="79" cy="40" rx="6"  ry="9"  fill="#1C1917"/>
  <!-- Green streak in hair -->
  <ellipse cx="36" cy="43" rx="3" ry="11" fill="#22C55E" opacity="0.8"/>
  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#D1FAE5"/>
  <circle cx="82" cy="52" r="5" fill="#D1FAE5"/>
  <!-- Ear piercing -->
  <circle cx="38" cy="52" r="2" fill="#22C55E"/>

  <!-- Eyes — wide, expressive -->
  <ellipse cx="51" cy="50" rx="4.5" ry="5" fill="#0F172A"/>
  <ellipse cx="69" cy="50" rx="4.5" ry="5" fill="#0F172A"/>
  <circle cx="52.5" cy="48.5" r="1.5" fill="#fff"/>
  <circle cx="70.5" cy="48.5" r="1.5" fill="#fff"/>
  <!-- Iris green -->
  <circle cx="51" cy="50" r="3" fill="#15803D"/>
  <circle cx="69" cy="50" r="3" fill="#15803D"/>
  <circle cx="51" cy="50" r="1.8" fill="#0F172A"/>
  <circle cx="69" cy="50" r="1.8" fill="#0F172A"/>
  <circle cx="52.5" cy="48.5" r="1.5" fill="#fff"/>
  <circle cx="70.5" cy="48.5" r="1.5" fill="#fff"/>

  <!-- Freckles -->
  <circle cx="46" cy="57" r="1.2" fill="#6B7280" opacity="0.45"/>
  <circle cx="50" cy="59" r="1"   fill="#6B7280" opacity="0.35"/>
  <circle cx="74" cy="57" r="1.2" fill="#6B7280" opacity="0.45"/>
  <circle cx="70" cy="59" r="1"   fill="#6B7280" opacity="0.35"/>

  <!-- Big grin -->
  <path d="M50,63 Q60,73 70,63" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="44" cy="60" rx="6" ry="3.5" fill="#22C55E" opacity="0.2"/>
  <ellipse cx="76" cy="60" rx="6" ry="3.5" fill="#22C55E" opacity="0.2"/>

  <!-- Badge -->
  <circle cx="96" cy="18" r="12" fill="#22C55E"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">S</text>
</svg>
