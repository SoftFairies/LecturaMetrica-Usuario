<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar María — Lectora apasionada</title>
  <desc>Avatar de perfil femenino con gafas y paleta dorada — LecturaMetrica</desc>
  <defs>
    <clipPath id="circle-clip"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#D4890A" stroke-width="3"/>
  <!-- Background -->
  <circle cx="60" cy="60" r="54" fill="#2D1B00" clip-path="url(#circle-clip)"/>

  <!-- Shoulders -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#7C2D12" clip-path="url(#circle-clip)"/>
  <ellipse cx="60" cy="100" rx="30" ry="20" fill="#92400E" clip-path="url(#circle-clip)"/>

  <!-- Hair back -->
  <ellipse cx="42" cy="52" rx="8" ry="20" fill="#1C1917"/>
  <ellipse cx="78" cy="52" rx="8" ry="20" fill="#1C1917"/>
  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#FCD34D"/>
  <!-- Hair top -->
  <ellipse cx="60" cy="34" rx="22" ry="12" fill="#1C1917"/>
  <ellipse cx="42" cy="42" rx="8" ry="14" fill="#1C1917"/>
  <ellipse cx="78" cy="42" rx="8" ry="14" fill="#1C1917"/>

  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#FCD34D"/>
  <circle cx="82" cy="52" r="5" fill="#FCD34D"/>

  <!-- Eyes -->
  <ellipse cx="51" cy="51" rx="3.5" ry="4" fill="#0F172A"/>
  <ellipse cx="69" cy="51" rx="3.5" ry="4" fill="#0F172A"/>
  <circle cx="52.2" cy="49.8" r="1.2" fill="#fff"/>
  <circle cx="70.2" cy="49.8" r="1.2" fill="#fff"/>

  <!-- Glasses -->
  <circle cx="51" cy="51" rx="8" ry="7.5" fill="none" stroke="#D4890A" stroke-width="1.6"/>
  <circle cx="69" cy="51" rx="8" ry="7.5" fill="none" stroke="#D4890A" stroke-width="1.6"/>
  <line x1="59"  cy="51" x1="59" y1="51" x2="61" y2="51" stroke="#D4890A" stroke-width="1.2"/>
  <line x1="43"  y1="50" x2="38" y2="49" stroke="#D4890A" stroke-width="1.2"/>
  <line x1="77"  y1="50" x2="82" y2="49" stroke="#D4890A" stroke-width="1.2"/>

  <!-- Nose dot -->
  <circle cx="60" cy="58" r="1.5" fill="#B45309" opacity="0.5"/>

  <!-- Smile -->
  <path d="M52,63 Q60,70 68,63" fill="none" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="44" cy="60" rx="6" ry="3.5" fill="#F43F5E" opacity="0.18"/>
  <ellipse cx="76" cy="60" rx="6" ry="3.5" fill="#F43F5E" opacity="0.18"/>

  <!-- Initial letter badge -->
  <circle cx="96" cy="18" r="12" fill="#D4890A"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">M</text>
</svg>
