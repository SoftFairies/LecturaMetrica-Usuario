<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img">
  <title>Avatar Patricia — Lectora clásica</title>
  <desc>Avatar de perfil femenino con moño y paleta ámbar — LecturaMetrica</desc>
  <defs>
    <clipPath id="cc"><circle cx="60" cy="60" r="56"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="#1A2332" stroke="#F59E0B" stroke-width="3"/>
  <circle cx="60" cy="60" r="54" fill="#1C1400" clip-path="url(#cc)"/>

  <!-- Shoulders -->
  <ellipse cx="60" cy="115" rx="42" ry="28" fill="#78350F" clip-path="url(#cc)"/>
  <ellipse cx="60" cy="100" rx="30" ry="20" fill="#B45309" clip-path="url(#cc)"/>

  <!-- Hair sides flowing down -->
  <ellipse cx="40" cy="58" rx="7" ry="18" fill="#7C2D12" clip-path="url(#cc)"/>
  <ellipse cx="80" cy="58" rx="7" ry="18" fill="#7C2D12" clip-path="url(#cc)"/>

  <!-- Head -->
  <circle cx="60" cy="52" r="22" fill="#FDE68A"/>
  <!-- Hair top / bun base -->
  <ellipse cx="60" cy="34" rx="22" ry="12" fill="#7C2D12"/>
  <ellipse cx="40" cy="43" rx="7"  ry="13" fill="#7C2D12"/>
  <ellipse cx="80" cy="43" rx="7"  ry="13" fill="#7C2D12"/>
  <!-- Bun -->
  <circle cx="60" cy="26" r="11" fill="#7C2D12"/>
  <circle cx="60" cy="26" r="7"  fill="#92400E"/>
  <circle cx="60" cy="26" r="3"  fill="#7C2D12"/>
  <!-- Bun ring detail -->
  <circle cx="60" cy="26" r="9" fill="none" stroke="#92400E" stroke-width="1.2" opacity="0.6"/>

  <!-- Ears -->
  <circle cx="38" cy="52" r="5" fill="#FDE68A"/>
  <circle cx="82" cy="52" r="5" fill="#FDE68A"/>
  <!-- Earring -->
  <circle cx="38" cy="58" r="2.5" fill="#F59E0B"/>
  <circle cx="82" cy="58" r="2.5" fill="#F59E0B"/>

  <!-- Eyes -->
  <ellipse cx="51" cy="50" rx="3.5" ry="4" fill="#0F172A"/>
  <ellipse cx="69" cy="50" rx="3.5" ry="4" fill="#0F172A"/>
  <circle cx="52.2" cy="48.8" r="1.2" fill="#fff"/>
  <circle cx="70.2" cy="48.8" r="1.2" fill="#fff"/>

  <!-- Lashes -->
  <line x1="47" y1="46.5" x2="45" y2="44"  stroke="#0F172A" stroke-width="1.2"/>
  <line x1="51" y1="46"   x2="51" y2="43.5" stroke="#0F172A" stroke-width="1.2"/>
  <line x1="55" y1="46.5" x2="57" y2="44"  stroke="#0F172A" stroke-width="1.2"/>
  <line x1="63" y1="46.5" x2="61" y2="44"  stroke="#0F172A" stroke-width="1.2"/>
  <line x1="69" y1="46"   x2="69" y2="43.5" stroke="#0F172A" stroke-width="1.2"/>
  <line x1="73" y1="46.5" x2="75" y2="44"  stroke="#0F172A" stroke-width="1.2"/>

  <!-- Smile -->
  <path d="M52,63 Q60,70 68,63" fill="none" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="44" cy="60" rx="6" ry="3.5" fill="#F43F5E" opacity="0.2"/>
  <ellipse cx="76" cy="60" rx="6" ry="3.5" fill="#F43F5E" opacity="0.2"/>

  <!-- Badge -->
  <circle cx="96" cy="18" r="12" fill="#F59E0B"/>
  <text x="96" y="23" style="font-family:system-ui,sans-serif;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;">P</text>
</svg>
